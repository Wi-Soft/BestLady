{% load static %}
<header>
    <div class="nav-bar">
        <div class="logo">
            <a href="{% url 'home' %}">BestLady</a>
        </div>

        <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>

        <!-- nav sits AFTER button, drops to full row below on mobile -->
        <nav id="mobile-menu">
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'products' %}">Products</a></li>
                <li><a href="{% url 'hairs' %}">Hairs</a></li>
                <li><a href="{% url 'nails' %}">Nails</a></li>
                <li><a href="{% url 'about' %}">About Us</a></li>
            </ul>
        </nav>
    </div>
</header>


<script>
    function toggleMenu() {
        document.getElementById("mobile-menu").classList.toggle("nav-show");
    }
</script>
