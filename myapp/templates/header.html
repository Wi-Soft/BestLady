{% load static %}
<header>
    <div class="nav-bar">
        <div class="logo">
            <a href="{% url 'home' %}">
                <img src="{% static 'img/logo.svg' %}" alt="BestLady" height="55">
            </a>
        </div>

        <button class="menu-toggle" onclick="toggleMenu()">&#9776;</button>

        <nav id="mobile-menu">
            <ul>
                <li><a href="{% url 'home' %}">Home</a></li>
                <li><a href="{% url 'products' %}">Products</a></li>
                <li><a href="{% url 'hairs' %}">Hairs</a></li>
                <li><a href="{% url 'nails' %}">Nails</a></li>
                <li><a href="{% url 'about' %}">About Us</a></li>
                <li><a href="{% url 'data_structure' %}">Data Structure</a></li>
            </ul>
        </nav>
    </div>
</header>



<script>
    function toggleMenu() {
        document.getElementById("mobile-menu").classList.toggle("nav-show");
    }

    // close menu when any nav link is clicked
    document.querySelectorAll("#mobile-menu a").forEach(function(link) {
        link.addEventListener("click", function() {
            document.getElementById("mobile-menu").classList.remove("nav-show");
        });
    });
</script>
