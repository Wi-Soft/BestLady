<button class="btn-buy" onclick="document.getElementById('modal-{{ item.id }}').style.display='flex'">Buy Now</button>

<div id="modal-{{ item.id }}" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; z-index:999;">
    <div style="background:#fff; padding:30px; border-radius:10px; width:360px; text-align:center;">
        <h2>Buy Now</h2>
        <p>{{ item.name }} — KSh {{ item.price }}</p>

        <input type="email" id="email-{{ item.id }}" placeholder="Email Address" style="width:80%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        <input type="tel" id="phone-{{ item.id }}" placeholder="Phone e.g 2547XXXXXXXX" style="width:80%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;">
        <input type="number" id="amount-{{ item.id }}" value="{{ item.price }}" readonly style="width:80%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; background:#f5f5f5; cursor:not-allowed;">

        <p id="msg-{{ item.id }}" style="font-size:13px; margin-bottom:10px;"></p>

        <div style="display:flex; gap:8px; justify-content:center;">
            <button class="btn-cart" onclick="document.getElementById('modal-{{ item.id }}').style.display='none'">Cancel</button>
            <button class="btn-buy" onclick="sendSTK('{{ item.id }}', '{{ item.price }}')">Pay Now</button>
        </div>
    </div>
</div>
